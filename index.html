<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catan Group Scoreboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold tracking-tight text-amber-500 flex items-center gap-2">
                ⛵️ Catan Scoreboard
            </h1>
            <div class="flex gap-2">
                <button id="adminBtn" onclick="toggleAdminPanelVisibility()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-semibold px-4 py-2 rounded-lg border border-slate-700 transition duration-200 cursor-pointer shadow-sm">
                    Admin Panel
                </button>
                <button id="logoutBtn" onclick="handleLogout()" class="hidden bg-rose-950/40 hover:bg-rose-900 text-rose-400 text-sm font-semibold px-4 py-2 rounded-lg border border-rose-900/50 transition duration-200 cursor-pointer shadow-sm">
                    Log Out
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <div id="adminContainer" class="hidden mb-10 p-6 bg-slate-900 rounded-xl border border-amber-500/30 shadow-xl shadow-amber-500/5 transition-all">
            
            <div id="loginFormBlock" class="max-w-sm mx-auto py-4">
                <h2 class="text-lg font-bold text-amber-400 mb-4 text-center">🔐 Admin Authentication</h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Username</label>
                        <input type="text" id="adminUsername" placeholder="admin" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm w-full focus:outline-none focus:border-amber-500 text-slate-100">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Password</label>
                        <input type="password" id="adminPassword" placeholder="••••••••" class="bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm w-full focus:outline-none focus:border-amber-500 text-slate-100">
                    </div>
                    <button onclick="handleLogin()" class="w-full mt-2 bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-2 rounded-lg text-sm transition cursor-pointer">
                        Sign In
                    </button>
                </div>
            </div>

            <div id="adminDashboardBlock" class="hidden">
                <h2 class="text-lg font-bold text-amber-400 mb-6 flex items-center gap-2 border-b border-slate-800 pb-2">
                    🛠️ Admin Control Dashboard
                </h2>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-slate-950/60 p-4 rounded-lg border border-slate-800">
                        <h3 class="font-semibold text-slate-200 mb-3 text-sm tracking-wide uppercase text-amber-500/80">Manage Players</h3>
                        <div class="space-y-3 mb-4 border-b border-slate-800 pb-4">
                            <input type="text" id="newPlayerName" placeholder="Name (e.g. Maiz)" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-sm w-full focus:outline-none focus:border-amber-500 text-slate-100">
                            
                            <div class="flex gap-2">
                                <div class="w-1/2">
                                    <label class="block text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1">Emoji Profile</label>
                                    <input type="text" id="newPlayerEmoji" placeholder="🦊" value="🎲" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-sm w-full text-center focus:outline-none focus:border-amber-500 text-slate-100">
                                </div>
                                <div class="w-1/2">
                                    <label class="block text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1">Theme Color</label>
                                    <div class="flex gap-1 items-center bg-slate-900 border border-slate-700 rounded-lg px-2 py-1">
                                        <input type="color" id="newPlayerColor" value="#f59e0b" class="bg-transparent border-0 w-8 h-7 p-0 cursor-pointer">
                                        <span class="text-xs font-mono text-slate-400">Pick</span>
                                    </div>
                                </div>
                            </div>
                            
                            <button onclick="addPlayer()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-1.5 rounded-lg text-sm transition cursor-pointer">Add Player Custom Avatar</button>
                        </div>
                        <div id="adminPlayersList" class="space-y-2 max-h-48 overflow-y-auto pr-1">
                            </div>
                    </div>

                    <div class="bg-slate-950/60 p-4 rounded-lg border border-slate-800 lg:col-span-2">
                        <h3 class="font-semibold text-slate-200 mb-3 text-sm tracking-wide uppercase text-amber-500/80">Log a New Match</h3>
                        <div id="matchFormPlayers" class="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-4">
                            </div>
                        
                        <div class="border-t border-slate-800 pt-4 flex flex-col sm:flex-row items-start sm:items-center gap-4 justify-between">
                            <div class="w-full sm:w-auto">
                                <label class="block text-xs text-slate-400 uppercase font-semibold mb-1">Longest Road</label>
                                <select id="longestRoadSelect" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-200 w-full sm:w-48 focus:outline-none focus:border-amber-500">
                                    </select>
                            </div>
                            <button onclick="submitMatch()" class="w-full sm:w-auto bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold px-6 py-2 rounded-lg text-sm shadow-md transition cursor-pointer self-end">
                                Submit Match Results 🎲
                            </button>
                        </div>
                    </div>
                </div>

                <div class="mt-6 border-t border-slate-800 pt-4">
                    <h3 class="font-semibold text-slate-200 mb-3 text-sm tracking-wide uppercase text-amber-500/80">Recent Matches History</h3>
                    <div class="overflow-x-auto bg-slate-950/40 rounded-lg border border-slate-800 max-h-48 overflow-y-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-xs font-semibold text-slate-400 border-b border-slate-800 bg-slate-900/50">
                                    <th class="p-3">Match ID</th>
                                    <th class="p-3">Longest Road Holder</th>
                                    <th class="p-3 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="adminMatchesList">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="bg-slate-900/40 border border-slate-800 rounded-2xl shadow-2xl backdrop-blur-md overflow-hidden">
                <div class="p-5 border-b border-slate-800/80 bg-slate-900/20 flex justify-between items-center">
                    <h2 class="text-base font-bold text-slate-200 tracking-tight flex items-center gap-2">
                        <span class="flex items-center justify-center w-7 h-7 rounded-lg bg-emerald-500/10 text-emerald-400 text-sm">🏆</span>
                        Most Wins Leaderboard
                    </h2>
                    <span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-slate-800 text-slate-400 font-mono">10+ PTS TO WIN</span>
                </div>
                <div class="p-2">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-xs font-semibold text-slate-400 uppercase tracking-wider border-b border-slate-800/60">
                                <th class="p-4 w-16 text-center">Rank</th>
                                <th class="p-4">Player</th>
                                <th class="p-4 text-right">Victories</th>
                            </tr>
                        </thead>
                        <tbody id="winsLeaderboardBody" class="divide-y divide-slate-800/40">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-slate-900/40 border border-slate-800 rounded-2xl shadow-2xl backdrop-blur-md overflow-hidden">
                <div class="p-5 border-b border-slate-800/80 bg-slate-900/20">
                    <h2 class="text-base font-bold text-slate-200 tracking-tight flex items-center gap-2">
                        <span class="flex items-center justify-center w-7 h-7 rounded-lg bg-amber-500/10 text-amber-400 text-sm">📊</span>
                        Cumulative Statistics
                    </h2>
                </div>
                <div class="p-2">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-xs font-semibold text-slate-400 uppercase tracking-wider border-b border-slate-800/60">
                                <th class="p-4">Player</th>
                                <th class="p-4 text-right">Total Points</th>
                                <th class="p-4 text-right w-36">Longest Road</th>
                            </tr>
                        </thead>
                        <tbody id="pointsLeaderboardBody" class="divide-y divide-slate-800/40">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://zbnqetjsyhibbdquecgm.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_auN7hvLZKVZtVWXTglsb9A_RHO7Ic_L";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let globalPlayers = [];
        let IsAdminAuthenticated = false;

        function toggleAdminPanelVisibility() {
            const container = document.getElementById('adminContainer');
            container.classList.toggle('hidden');
            updateAdminUIViewState();
        }

        function handleLogin() {
            const userField = document.getElementById('adminUsername').value.trim();
            const passField = document.getElementById('adminPassword').value;

            if (userField === "admin" && passField === "settlers10") {
                IsAdminAuthenticated = true;
                updateAdminUIViewState();
                document.getElementById('adminUsername').value = '';
                document.getElementById('adminPassword').value = '';
            } else {
                alert("Invalid admin user identity or password.");
            }
        }

        function handleLogout() {
            IsAdminAuthenticated = false;
            updateAdminUIViewState();
            document.getElementById('adminContainer').classList.add('hidden');
        }

        function updateAdminUIViewState() {
            const loginBlock = document.getElementById('loginFormBlock');
            const dashboardBlock = document.getElementById('adminDashboardBlock');
            const logoutBtn = document.getElementById('logoutBtn');
            const adminToggleBtn = document.getElementById('adminBtn');

            if (IsAdminAuthenticated) {
                loginBlock.classList.add('hidden');
                dashboardBlock.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                adminToggleBtn.innerText = "Close Panel";
            } else {
                loginBlock.classList.remove('hidden');
                dashboardBlock.classList.add('hidden');
                logoutBtn.classList.add('hidden');
                adminToggleBtn.innerText = "Admin Panel";
            }
        }

        async function loadDashboard() {
            await fetchPlayers();
            await fetchRecentMatches();
            await renderLeaderboards();
        }

        async function fetchPlayers() {
            const { data, error } = await db.from('players').select('*').order('name', { ascending: true });
            if (error) return console.error(error);
            globalPlayers = data;
            
            const formContainer = document.getElementById('matchFormPlayers');
            const roadSelect = document.getElementById('longestRoadSelect');
            const adminPlayersList = document.getElementById('adminPlayersList');
            
            if (!formContainer || !roadSelect || !adminPlayersList) return;

            formContainer.innerHTML = '';
            roadSelect.innerHTML = '<option value="">Nobody / Tie</option>';
            adminPlayersList.innerHTML = '';

            data.forEach(player => {
                const pEmoji = player.avatar_emoji || '🎲';
                const pColor = player.avatar_color || '#f59e0b';

                formContainer.innerHTML += `
                    <div class="flex items-center justify-between bg-slate-900/80 p-2 rounded-lg border border-slate-800">
                        <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer select-none">
                            <input type="checkbox" data-id="${player.id}" class="match-player-check rounded text-amber-500 focus:ring-0 bg-slate-800 border-slate-700">
                            <span class="inline-flex items-center justify-center w-6 h-6 rounded-md text-xs" style="background-color: ${pColor}20; color: ${pColor}; border: 1px solid ${pColor}40">${pEmoji}</span>
                            ${player.name}
                        </label>
                        <input type="number" data-id="${player.id}" min="0" max="15" placeholder="0" class="match-player-score bg-slate-950 border border-slate-700 rounded px-2 py-1 w-16 text-center text-sm focus:outline-none focus:border-amber-500 text-slate-100">
                    </div>
                `;
                roadSelect.innerHTML += `<option value="${player.id}">${player.name}</option>`;
                adminPlayersList.innerHTML += `
                    <div class="flex items-center justify-between bg-slate-900/40 px-3 py-1.5 rounded-md border border-slate-800/60 text-sm text-slate-300">
                        <div class="flex items-center gap-2">
                            <span class="inline-flex items-center justify-center w-5 h-5 rounded" style="background-color: ${pColor}20; color: ${pColor}">${pEmoji}</span>
                            <span>${player.name}</span>
                        </div>
                        <button onclick="deletePlayer('${player.id}', '${player.name}')" class="text-xs text-rose-400 hover:text-rose-600 transition cursor-pointer font-medium font-mono px-1">✕ Delete</button>
                    </div>
                `;
            });
        }

        async function fetchRecentMatches() {
            const adminMatchesList = document.getElementById('adminMatchesList');
            if (!adminMatchesList) return;

            const { data: matches, error } = await db.from('matches').select('id, longest_road_player_id, created_at').order('created_at', { ascending: false }).limit(20);
            if (error) return console.error(error);

            adminMatchesList.innerHTML = '';
            if (matches.length === 0) {
                adminMatchesList.innerHTML = `<tr><td colspan="3" class="p-3 text-sm text-slate-500 text-center">No matches recorded yet.</td></tr>`;
                return;
            }

            matches.forEach(m => {
                const roadHolder = globalPlayers.find(p => p.id == m.longest_road_player_id);
                const roadName = roadHolder ? roadHolder.name : "None / Tie";
                const shortId = m.id.substring(0, 8);
                
                adminMatchesList.innerHTML += `
                    <tr class="text-sm border-b border-slate-800/40 hover:bg-slate-900/20">
                        <td class="p-3 text-slate-400 font-mono text-xs">ID: ${shortId}...</td>
                        <td class="p-3 text-slate-200">${roadName}</td>
                        <td class="p-3 text-right">
                            <button onclick="deleteMatch('${m.id}')" class="text-xs bg-rose-950/40 hover:bg-rose-900 text-rose-400 px-2.5 py-1 rounded border border-rose-900/50 transition cursor-pointer">
                                Delete Match
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        async function addPlayer() {
            const nameInput = document.getElementById('newPlayerName');
            const emojiInput = document.getElementById('newPlayerEmoji');
            const colorInput = document.getElementById('newPlayerColor');

            const name = nameInput.value.trim();
            const avatar_emoji = emojiInput.value.trim() || '🎲';
            const avatar_color = colorInput.value;

            if (!name) return alert('Please enter a name.');

            const { error } = await db.from('players').insert([{ name, avatar_emoji, avatar_color }]);
            if (error) {
                alert('Error adding player or player already exists.');
            } else {
                nameInput.value = '';
                emojiInput.value = '🎲';
                colorInput.value = '#f59e0b';
                await loadDashboard();
            }
        }

        async function deletePlayer(id, name) {
            if (!confirm(`Are you sure you want to delete "${name}"? This deletes all associated match history for them.`)) return;
            const { error } = await db.from('players').delete().eq('id', id);
            if (error) {
                alert('Failed to delete player: ' + error.message);
            } else {
                await loadDashboard();
            }
        }

        async function deleteMatch(matchId) {
            if (!confirm("Are you sure you want to delete this match record? All player points gained from this match will be lost permanently.")) return;
            const { error } = await db.from('matches').delete().eq('id', matchId);
            if (error) {
                alert('Failed to drop match: ' + error.message);
            } else {
                await loadDashboard();
            }
        }

        async function submitMatch() {
            const checkedBoxes = document.querySelectorAll('.match-player-check:checked');
            const longestRoadPlayerId = document.getElementById('longestRoadSelect').value || null;

            if (checkedBoxes.length < 2) return alert('A match must have at least 2 players.');

            const { data: matchData, error: matchError } = await db.from('matches').insert([{ longest_road_player_id: longestRoadPlayerId }]).select();
            if (matchError) return alert('Failed to create match record.');
            const matchId = matchData[0].id;

            const scoreRecords = [];
            checkedBoxes.forEach(cb => {
                const playerId = cb.getAttribute('data-id');
                const scoreInput = document.querySelector(`.match-player-score[data-id="${playerId}"]`);
                const score = parseInt(scoreInput.value) || 0;
                
                scoreRecords.push({
                    match_id: matchId,
                    player_id: playerId,
                    points_scored: score
                });
            });

            const { error: scoreError } = await db.from('match_scores').insert(scoreRecords);
            if (scoreError) {
                alert('Error recording match scores.');
            } else {
                alert('Match recorded successfully! 🎲');
                document.querySelectorAll('.match-player-check').forEach(c => c.checked = false);
                document.querySelectorAll('.match-player-score').forEach(i => i.value = '');
                document.getElementById('longestRoadSelect').value = '';
                await loadDashboard();
            }
        }

        async function renderLeaderboards() {
            const { data: scores, error: scoresErr } = await db.from('match_scores').select('match_id, player_id, points_scored');
            const { data: matches, error: matchesErr } = await db.from('matches').select('id, longest_road_player_id');
            if (scoresErr || matchesErr) return;

            const stats = {};
            globalPlayers.forEach(p => {
                stats[p.id] = { name: p.name, emoji: p.avatar_emoji || '🎲', color: p.avatar_color || '#f59e0b', wins: 0, totalPoints: 0, longestRoads: 0 };
            });

            const scoresByMatch = {};
            scores.forEach(s => {
                if (stats[s.player_id]) {
                    stats[s.player_id].totalPoints += s.points_scored;
                }
                if (!scoresByMatch[s.match_id]) {
                    scoresByMatch[s.match_id] = [];
                }
                scoresByMatch[s.match_id].push(s);
            });

            Object.keys(scoresByMatch).forEach(matchId => {
                const matchPlayers = scoresByMatch[matchId];
                let highestScore = -1;
                let winnerPlayerId = null;

                matchPlayers.forEach(pRecord => {
                    if (pRecord.points_scored >= 10 && pRecord.points_scored > highestScore) {
                        highestScore = pRecord.points_scored;
                        winnerPlayerId = pRecord.player_id;
                    }
                });

                if (winnerPlayerId && stats[winnerPlayerId]) {
                    stats[winnerPlayerId].wins += 1;
                }
            });

            matches.forEach(m => {
                if (m.longest_road_player_id && stats[m.longest_road_player_id]) {
                    stats[m.longest_road_player_id].longestRoads += 1;
                }
            });

            const statsArray = Object.values(stats);

            // Render Wins Leaderboard Rows
            const winsSorted = [...statsArray].sort((a, b) => b.wins - a.wins);
            const winsBody = document.getElementById('winsLeaderboardBody');
            if (winsBody) {
                winsBody.innerHTML = '';
                winsSorted.forEach((p, index) => {
                    let rankBadge = `<span class="font-mono text-slate-500 font-bold">#${index + 1}</span>`;
                    if (index === 0 && p.wins > 0) rankBadge = `<span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-amber-500/20 text-amber-400 text-xs font-bold border border-amber-500/30">🥇</span>`;
                    if (index === 1 && p.wins > 0) rankBadge = `<span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-slate-400/20 text-slate-300 text-xs font-bold border border-slate-400/30">🥈</span>`;
                    
                    winsBody.innerHTML += `
                        <tr class="group hover:bg-slate-900/30 transition duration-150">
                            <td class="p-4 text-center font-medium">${rankBadge}</td>
                            <td class="p-4 font-semibold text-slate-200 group-hover:text-amber-400 transition flex items-center gap-3">
                                <span class="inline-flex items-center justify-center w-8 h-8 rounded-xl text-sm" style="background-color: ${p.color}15; color: ${p.color}; border: 1px solid ${p.color}30">
                                    ${p.emoji}
                                </span>
                                ${p.name}
                            </td>
                            <td class="p-4 text-right">
                                <span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold font-mono ${p.wins > 0 ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-slate-800/40 text-slate-500'}" style="${p.wins > 0 ? `background-color: ${p.color}10; color: ${p.color}; border-color: ${p.color}30;` : ''}">
                                    ${p.wins} ${p.wins === 1 ? 'Win' : 'Wins'}
                                </span>
                            </td>
                        </tr>
                    `;
                });
            }

            // Render Points & Road Leaderboard Rows
            const pointsSorted = [...statsArray].sort((a, b) => b.totalPoints - a.totalPoints);
            const pointsBody = document.getElementById('pointsLeaderboardBody');
            if (pointsBody) {
                pointsBody.innerHTML = '';
                pointsSorted.forEach(p => {
                    pointsBody.innerHTML += `
                        <tr class="group hover:bg-slate-900/30 transition duration-150">
                            <td class="p-4 font-semibold text-slate-200 group-hover:text-amber-400 transition flex items-center gap-3">
                                <span class="inline-flex items-center justify-center w-8 h-8 rounded-xl text-sm" style="background-color: ${p.color}15; color: ${p.color}; border: 1px solid ${p.color}30">
                                    ${p.emoji}
                                </span>
                                ${p.name}
                            </td>
                            <td class="p-4 text-right font-bold text-amber-500/90 font-mono text-sm">${p.totalPoints} <span class="text-xs text-slate-500 font-normal">pts</span></td>
                            <td class="p-4 text-right">
                                <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md text-xs font-bold font-mono ${p.longestRoads > 0 ? 'bg-blue-500/10 text-blue-400 border border-blue-500/20' : 'bg-slate-800/40 text-slate-500'}">
                                    🪵 ${p.longestRoads}
                                </span>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        loadDashboard();
    </script>
</body>
</html>
